name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Go Backend ──────────────────────────────────────────────────────────────
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  go-test:
    name: Go Test (race + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Enforce 80% coverage
        run: |
          go tool cover -func=coverage.out | awk '/total/{if ($3+0 < 80) { print "❌ Coverage below 80%: " $3; exit 1 } else { print "✅ Coverage: " $3 }}'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  go-build:
    name: Go Build (distroless)
    runs-on: ubuntu-latest
    needs: [go-lint, go-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build binary
        run: CGO_ENABLED=0 go build -ldflags='-w -s' -o bin/streampulse ./cmd/server

      - name: Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: streampulse-api:${{ github.sha }}

  # ── Flutter Mobile ──────────────────────────────────────────────────────────
  flutter-test:
    name: Flutter Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Get dependencies
        working-directory: mobile/streampulse
        run: flutter pub get

      - name: Analyze
        working-directory: mobile/streampulse
        run: flutter analyze

      - name: Run tests
        working-directory: mobile/streampulse
        run: flutter test

      - name: Build web (admin)
        working-directory: mobile/streampulse
        run: flutter build web --release
