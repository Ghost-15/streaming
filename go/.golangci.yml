version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - godot
    - noctx
    - bodyclose
  exclusions:
    rules:
      # Test files have fewer constraints.
      - path: _test\.go
        linters:
          - errcheck
      # Mocks may contain unused fields.
      - path: internal/usecase/mock/
        linters:
          - unused
      # Swagger annotations do not end with a period.
      - path: internal/handler/
        linters:
          - godot

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/Ghost-15/streaming
