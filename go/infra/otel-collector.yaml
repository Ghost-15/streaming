file_format: yaml

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 100

  # Log every trace for debugging
  logging:
    loglevel: debug

exporters:
  otlp/grafana:
    endpoint: "otlp-gateway-prod-gb-south-1.grafana.net:443"
    auth:
      authenticator: basicauth/grafana
    headers:
      User-Agent: otel-collector/0.68.0

  # Note: Logs sent via Docker container stdout → Promtail/Loki should forward to Grafana Cloud
  # See: https://grafana.com/docs/grafana-cloud/send-data/log-data/
  loki/grafana:
    endpoint: "https://logs-prod-gb-south-1.grafana.net/loki/api/v1/push"
    auth:
      authenticator: basicauth/grafana

extensions:
  basicauth/grafana:
    client_auth:
      username: 1474936
      password: "${env:GRAFANA_CLOUD_TOKEN}"

service:
  extensions: [basicauth/grafana]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, logging]
      exporters: [otlp/grafana]
    # logs pipeline not active yet — app sends JSON to stdout.
    # To correlate logs with traces in Grafana Cloud, use Promtail:
    # https://grafana.com/docs/loki/latest/clients/promtail/installation/